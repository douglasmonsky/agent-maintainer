[tool.ai_guardrails]
source_roots = ["scripts", ".codex/hooks"]
test_roots = []
package_paths = ["scripts", ".codex/hooks"]
coverage_source = ["scripts", ".codex/hooks"]
file_length_paths = ["scripts", ".codex/hooks"]
vulture_paths = ["scripts", ".codex/hooks"]
require_tests = false
coverage_fail_under = 80
diff_cover_fail_under = 90
file_length_max_physical = 600
file_length_max_source = 450
change_warn_lines = 300
change_block_lines = 800
change_warn_files = 8
change_block_files = 20
suppression_max_new = 3
xenon_max_absolute = "B"
xenon_max_modules = "A"
xenon_max_average = "A"
ruff_max_complexity = 10
pyright_type_checking_mode = "standard"
enable_pip_audit = false

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "B",
  "UP",
  "SIM",
  "C90",
  "PLR",
  "RUF",
]
ignore = []

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.coverage.run]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 80
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
]

[tool.deptry]
known_first_party = [
  "guardrail_catalog",
  "guardrail_config",
  "guardrail_executor",
  "guardrail_models",
  "guardrail_reporting",
  "verify_quiet",
]
requirements_files = ["requirements.txt"]
requirements_files_dev = ["config/dev-dependencies.txt"]

[tool.deptry.per_rule_ignores]
DEP003 = ["tomli"]
DEP004 = ["tomli"]
