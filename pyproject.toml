[tool.ai_guardrails]
mode = "fresh-strict"
architecture_tool = "tach"
source_roots = ["scripts", ".codex/hooks", "guardrail_lib"]
test_roots = ["tests"]
package_paths = ["scripts", ".codex/hooks", "guardrail_lib"]
coverage_source = ["scripts", ".codex/hooks", "guardrail_lib"]
file_length_paths = ["scripts", ".codex/hooks", "guardrail_lib", "tests"]
vulture_paths = ["scripts", ".codex/hooks", "guardrail_lib", "tests"]
require_tests = true
coverage_fail_under = 80
diff_cover_fail_under = 90
source_without_test_change_error_profiles = ["precommit"]
allow_source_without_test_change = false
xenon_max_absolute = "B"
xenon_max_modules = "A"
xenon_max_average = "A"
pyright_type_checking_mode = "standard"
enable_pip_audit = true
pip_audit_args = ["-r", "config/dev-lock.txt"]
enable_wemake = true
enable_interrogate = true
interrogate_fail_under = 80

[tool.ai_guardrails.diagnostics]
enabled = true
log_dir = ".verify-logs"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "B",
  "UP",
  "SIM",
  "C90",
  "PLR",
  "RUF",
]
ignore = []

[tool.ruff.lint.mccabe]
max-complexity = 8

[tool.coverage.run]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 80
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.deptry]
known_first_party = [
  "check_pip_audit_config",
  "check_tach_config",
  "guardrail_lib",
  "scripts",
  "guardrail_args",
  "guardrail_catalog",
  "guardrail_config",
  "guardrail_doctor",
  "guardrail_doctor_logs",
  "guardrail_doctor_models",
  "guardrail_doctor_policy",
  "guardrail_executor",
  "guardrail_guidance",
  "guardrail_layout",
  "guardrail_models",
  "guardrail_reporting",
  "guardrail_tach",
  "run_pyright",
  "verify_quiet",
]
requirements_files = ["requirements.txt"]
requirements_files_dev = ["config/dev-dependencies.txt", "config/dev-lock.txt"]

[tool.deptry.per_rule_ignores]
DEP003 = ["tomli"]
DEP004 = ["tomli"]
