[tool.ai_guardrails]
mode = "fresh-strict"
architecture_tool = "tach"
source_roots = ["scripts", ".codex/hooks", "guardrail_lib"]
test_roots = ["tests"]
package_paths = ["scripts", ".codex/hooks", "guardrail_lib"]
coverage_source = ["scripts", ".codex/hooks", "guardrail_lib"]
file_length_paths = ["scripts", ".codex/hooks", "guardrail_lib", "tests"]
structure_paths = ["scripts", ".codex/hooks", "guardrail_lib"]
structure_ignore_paths = [
  "tests/**",
  "migrations/**",
  "generated/**",
  ".venv/**",
  "venv/**",
  "**/__pycache__/**",
]
folder_file_warn = 20
folder_file_block = 40
structure_cluster_min = 4
vulture_paths = ["scripts", ".codex/hooks", "guardrail_lib", "tests"]
require_tests = true
coverage_fail_under = 90
diff_cover_fail_under = 90
source_without_test_change_error_profiles = ["precommit"]
allow_source_without_test_change = false
xenon_max_absolute = "B"
xenon_max_modules = "A"
xenon_max_average = "A"
pyright_type_checking_mode = "standard"
enable_pip_audit = true
pip_audit_args = ["-r", "config/dev-lock.txt"]
enable_mutmut = true
mutmut_args = ["run"]
enable_semgrep = true
semgrep_args = [
  "scan",
  "--config",
  "semgrep.yml",
  "--error",
  "--metrics=off",
  "scripts",
  ".codex/hooks",
  "guardrail_lib",
]
semgrep_profiles = ["manual"]
enable_secret_scanning = true
secret_scanner = "gitleaks"
secret_scan_profiles = ["full", "ci"]
secret_scan_history_profiles = ["security"]
enable_wemake = true
enable_interrogate = true
interrogate_fail_under = 80
enable_markdownlint = true
markdownlint_paths = ["**/*.md"]
enable_yamllint = true
yamllint_paths = [
  ".github/workflows",
  ".github/dependabot.yml",
  ".pre-commit-config.yaml",
  ".markdownlint-cli2.yaml",
  ".yamllint",
  "zizmor.yml",
]
enable_taplo = true
taplo_paths = ["pyproject.toml", "tach.toml", "config/*.toml"]
enable_check_jsonschema = true
check_jsonschema_args = [
  "--builtin-schema",
  "vendor.github-workflows",
  ".github/workflows/verify.yml",
]

[tool.ai_guardrails.diagnostics]
enabled = true
log_dir = ".verify-logs"

[tool.mutmut]
source_paths = ["scripts/"]
only_mutate = ["scripts/guardrail_runtime.py"]
pytest_add_cli_args_test_selection = ["tests/test_runtime.py"]
pytest_add_cli_args = ["-p", "no:tach"]
mutate_only_covered_lines = true
use_setproctitle = false

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "C90", "PLR", "RUF"]
ignore = []

[tool.ruff.lint.mccabe]
max-complexity = 8

[tool.coverage.run]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 80
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.deptry]
known_first_party = [
  "check_pip_audit_config",
  "check_tach_config",
  "guardrail_lib",
  "scripts",
  "guardrail_args",
  "guardrail_catalog",
  "guardrail_catalog_python",
  "guardrail_config",
  "guardrail_doctor",
  "guardrail_doctor_hook_audit",
  "guardrail_doctor_logs",
  "guardrail_doctor_models",
  "guardrail_doctor_policy",
  "guardrail_executor",
  "guardrail_guidance",
  "guardrail_layout",
  "guardrail_models",
  "guardrail_reporting",
  "guardrail_tach",
  "guardrail_tool_capabilities",
  "hook_audit",
  "run_bandit",
  "run_pyright",
  "run_ruff",
  "verify_quiet",
]
requirements_files = ["requirements.txt"]
requirements_files_dev = ["config/dev-dependencies.txt", "config/dev-lock.txt"]

[tool.deptry.per_rule_ignores]
DEP003 = ["tomli"]
DEP004 = ["tomli"]
