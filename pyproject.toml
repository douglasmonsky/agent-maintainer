[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai_guardrails"
version = "0.1.0"
description = "Drop-in maintainability guardrails for AI-assisted Python repositories."
readme = "README.md"
requires-python = ">=3.11"

[project.scripts]
ai-guardrails = "ai_guardrails.cli:console_main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ai_guardrails]
mode = "fresh-strict"
architecture_tool = "tach"
source_roots = ["src/ai_guardrails", ".codex/hooks"]
test_roots = ["tests"]
package_paths = ["src/ai_guardrails", ".codex/hooks"]
coverage_source = ["src/ai_guardrails", ".codex/hooks"]
file_length_paths = ["src/ai_guardrails", ".codex/hooks", "tests"]
structure_paths = ["src/ai_guardrails", ".codex/hooks"]
structure_ignore_paths = [
  "tests/**",
  "migrations/**",
  "generated/**",
  ".venv/**",
  "venv/**",
  "**/__pycache__/**",
]
folder_file_warn = 20
folder_file_block = 40
structure_cluster_min = 4
vulture_paths = ["src/ai_guardrails", ".codex/hooks", "tests"]
require_tests = true
coverage_fail_under = 90
diff_cover_fail_under = 90
source_without_test_change_error_profiles = ["precommit"]
allow_source_without_test_change = false
xenon_max_absolute = "B"
xenon_max_modules = "A"
xenon_max_average = "A"
pyright_type_checking_mode = "standard"
enable_pip_audit = true
pip_audit_args = ["-r", "config/dev-lock.txt"]
enable_mutmut = true
mutmut_args = ["run"]
enable_semgrep = true
semgrep_args = [
  "scan",
  "--config",
  "semgrep.yml",
  "--error",
  "--metrics=off",
  "src/ai_guardrails",
  ".codex/hooks",
]
semgrep_profiles = ["manual"]
enable_sbom = true
sbom_args = [
  "requirements",
  "config/dev-lock.txt",
  "--output-reproducible",
  "--of",
  "JSON",
]
sbom_profiles = ["ci"]
enable_license_check = true
license_check_args = ["--from=mixed", "--format=json"]
license_check_profiles = ["manual"]
enable_secret_scanning = true
secret_scanner = "gitleaks"
secret_scan_profiles = ["full", "ci"]
secret_scan_history_profiles = ["security"]
enable_wemake = true
enable_interrogate = true
interrogate_fail_under = 80
enable_markdownlint = true
markdownlint_paths = ["**/*.md"]
enable_yamllint = true
yamllint_paths = [
  ".github/workflows",
  ".github/dependabot.yml",
  ".pre-commit-config.yaml",
  ".markdownlint-cli2.yaml",
  ".yamllint",
  "zizmor.yml",
]
enable_taplo = true
taplo_paths = ["pyproject.toml", "tach.toml", "config/*.toml"]
enable_check_jsonschema = true
check_jsonschema_args = [
  "--builtin-schema",
  "vendor.github-workflows",
  ".github/workflows/verify.yml",
]

[tool.ai_guardrails.diagnostics]
enabled = true
log_dir = ".verify-logs"

[tool.mutmut]
source_paths = ["src/ai_guardrails/"]
only_mutate = ["src/ai_guardrails/core/runtime.py"]
pytest_add_cli_args_test_selection = ["tests/core/test_runtime.py"]
pytest_add_cli_args = ["-p", "no:tach"]
mutate_only_covered_lines = true
use_setproctitle = false

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "C90", "PLR", "RUF"]
ignore = []

[tool.ruff.lint.mccabe]
max-complexity = 8

[tool.coverage.run]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 80
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
]

[tool.pytest.ini_options]
pythonpath = [".", "src"]
testpaths = ["tests"]

[tool.deptry]
known_first_party = ["ai_guardrails", "hook_audit"]
requirements_files = ["requirements.txt"]
requirements_files_dev = ["config/dev-dependencies.txt", "config/dev-lock.txt"]

[tool.deptry.per_rule_ignores]
DEP003 = ["tomli"]
DEP004 = ["tomli"]
