# Merge these sections into your existing pyproject.toml.
# Adjust [tool.ai_guardrails] paths if your repository does not use src/ and tests/.

[tool.ai_guardrails]
# Optional: custom (default), legacy-ratchet, or fresh-strict.
# mode = "custom"
source_roots = ["src"]
test_roots = ["tests"]
package_paths = ["src"]
coverage_source = ["src"]
file_length_paths = ["src", "tests", "scripts", ".codex/hooks"]
vulture_paths = ["src", "tests", "scripts"]
require_tests = true
coverage_fail_under = 80
diff_cover_fail_under = 90
file_length_max_physical = 600
file_length_max_source = 450
change_warn_lines = 300
change_block_lines = 800
change_warn_files = 8
change_block_files = 20
suppression_max_new = 3
xenon_max_absolute = "B"
xenon_max_modules = "A"
xenon_max_average = "A"
ruff_max_complexity = 10
pyright_type_checking_mode = "standard"

# Disabled by default because pip-audit may query external vulnerability data
# and can audit unrelated active-environment packages if no input file is used.
enable_pip_audit = false
# Example when enabled:
# pip_audit_args = ["-r", "config/dev-lock.txt"]

# Disabled by default because wemake is intentionally strict. Enable for fresh
# repos or existing repos that have a clean baseline or ratchet plan.
enable_wemake = false

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "F",    # pyflakes
  "I",    # import sorting
  "B",    # bugbear-style correctness checks
  "UP",   # pyupgrade
  "SIM",  # simplification checks
  "C90",  # McCabe complexity
  "PLR",  # Pylint refactor rules exposed by Ruff
  "RUF",  # Ruff-specific rules
]
ignore = []

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.pytest.ini_options]
# The verifier passes configured test roots directly. Uncomment if you also want
# plain `pytest` to use a fixed default.
# testpaths = ["tests"]

[tool.coverage.run]
branch = true
# The verifier passes configured coverage sources through pytest-cov `--cov`.
# Uncomment and adjust only if you also run coverage without the verifier.
# source = ["src"]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 80
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
]
