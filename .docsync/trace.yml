claims:
  claim.docsync.extractable_boundary:
    object: docs.docsync_extraction.overview
    text: DocSync is an extractable sibling package with no dependencies on Agent
      Maintainer or Archguard.
    severity: high
    evidence:
    - evidence.docsync.domain_contract
    - evidence.docsync.boundary_test
    review:
      acceptable_attestation_reasons:
      - internal_refactor_only
  claim.docsync.trace_source_truth:
    object: docs.docsync_extraction.overview
    text: DocSync uses explicit evidence regions and rebuildable generated outputs
      under .docsync/out.
    severity: medium
    evidence:
    - evidence.docsync.explicit_evidence_scanner
    - evidence.docsync.generated_outputs_commands
    review:
      acceptable_attestation_reasons:
      - docs_only
  claim.docsync.command_surface:
    object: docs.docsync_extraction.overview
    text: DocSync exposes init, index, check, prompt, attest, and doctor commands.
    severity: medium
    evidence:
    - evidence.docsync.cli_commands
    review:
      acceptable_attestation_reasons:
      - command_surface_reviewed
  claim.readme.package_identity:
    object: docs.readme.overview
    text: README presents Agent Maintainer as the agent-maintainer package with the
      agent-maintainer console script and python -m agent_maintainer module command.
    severity: high
    evidence:
    - evidence.readme.package_metadata
    - evidence.readme.command_registry
  claim.readme.quick_start_flow:
    object: docs.readme.quick_start
    text: README Quick Start uses package installation followed by init, doctor, and
      verify commands.
    severity: high
    evidence:
    - evidence.readme.package_metadata
    - evidence.readme.command_registry
  claim.readme.adoption_tracks:
    object: docs.readme.adoption_tracks
    text: README Adoption Tracks describe the core, agent, and hardening starter
      tracks backed by initializer templates and package-first generated files.
    severity: high
    evidence:
      - evidence.readme.adoption_track_templates
      - evidence.readme.initializer_tests
  claim.readme.run_profiles:
    object: docs.readme.run_profiles
    text: README lists the stable verifier profile command surface for precommit,
      full, ci, security, and manual runs.
    severity: high
    evidence:
    - evidence.readme.command_registry
    - evidence.readme.catalog_composition
  claim.readme.supported_checks:
    object: docs.readme.supported_checks
    text: README supported-checks overview is backed by the live check catalog,
      Python provider checks, docs/config checks, and security scanner checks.
    severity: high
    evidence:
      - evidence.readme.catalog_composition
      - evidence.readme.python_provider_checks
      - evidence.readme.docs_config_checks
      - evidence.readme.security_catalog_checks
      - evidence.readme.secret_scan_checks
  claim.readme.agent_repair_loop:
    object: docs.readme.agent_loop
    text: README tells agents to use compact verifier/context commands and run-scoped
      .verify-logs artifacts instead of dumping raw logs.
    severity: high
    evidence:
    - evidence.readme.command_registry
    - evidence.readme.diagnostic_artifacts
  claim.readme.technical_debt_surface:
    object: docs.readme.technical_debt
    text: README documents the technical debt assessment command surface.
    severity: medium
    evidence:
    - evidence.readme.command_registry
  claim.docs.quick_start_package_flow:
    object: docs.quick_start.overview
    text: Quick Start documents package-first installation, initialization, and precommit
      verification commands.
    severity: high
    evidence:
    - evidence.readme.package_metadata
    - evidence.readme.command_registry
  claim.docs.onboarding_first_run_repair_loop:
    object: docs.onboarding_first_run.overview
    text: First Run Walkthrough documents the intended doctor, precommit, and LAST_FAILURE
      repair loop.
    severity: high
    evidence:
    - evidence.readme.command_registry
    - evidence.readme.diagnostic_artifacts
  claim.docs.diagnostics_run_scoped_artifacts:
    object: docs.diagnostics_repair_loop.overview
    text: Diagnostics docs explain summary-first output and run-scoped .verify-logs
      artifacts.
    severity: high
    evidence:
    - evidence.readme.diagnostic_artifacts
  claim.docs.supported_scans_catalog:
    object: docs.supported_scans.overview
    text: Supported scans docs summarize the active catalog areas and agent-facing
      scan workflow.
    severity: high
    evidence:
    - evidence.readme.catalog_composition
    - evidence.readme.python_provider_checks
    - evidence.readme.docs_config_checks
    - evidence.readme.security_catalog_checks
    - evidence.readme.secret_scan_checks
  claim.docs.ratcheting_command_surface:
    object: docs.ratcheting.overview
    text: Ratcheting docs document the ratchet command surface exposed by Agent Maintainer.
    severity: medium
    evidence:
    - evidence.readme.command_registry
  claim.docs.provider_status_python_core:
    object: docs.provider_status.overview
    text: Provider status docs describe Python as the core/reference provider and
      current provider expansion as staged.
    severity: medium
    evidence:
      - evidence.readme.catalog_composition
      - evidence.readme.python_provider_checks
      - evidence.provider_registry.active_providers
  claim.docs.provider_status_no_active_go:
    object: docs.provider_status.overview
    text: Provider status docs state Go is not an active provider on main.
    severity: medium
    evidence:
      - evidence.provider_registry.no_active_go
  claim.docs.typescript_provider_explicit_commands:
    object: docs.typescript_provider.overview
    text: TypeScript provider docs describe disabled-by-default explicit
      configured command checks and profile configuration without package-manager
      autodetection.
    severity: high
    evidence:
      - evidence.typescript.provider_commands
      - evidence.typescript.provider_command_tests
  claim.docs.typescript_provider_repair_facts:
    object: docs.typescript_provider.overview
    text: TypeScript provider docs describe structured summaries and exact repair
      facts for tsc, ESLint JSON, and Jest-compatible JSON outputs with malformed
      output fallback.
    severity: medium
    evidence:
      - evidence.typescript.structured_output_tests
      - evidence.typescript.repair_fact_tests
  claim.docs.typescript_provider_unsupported_surface:
    object: docs.typescript_provider.overview
    text: TypeScript provider docs document unsupported package managers,
      test runners, frameworks, coverage, dependency, security, mutation,
      and blocking reviewability surfaces.
    severity: medium
    evidence:
      - evidence.typescript.provider_docs_maturity_tests
  claim.docs.typescript_maturation_fixture_evidence:
    object: docs.typescript_maturation.overview
    text: TypeScript maturation notes summarize fixture evidence for source/test,
      source-heavy, generated, dependency/config, and suppression scenarios while
      keeping TypeScript reviewability advisory-only.
    severity: high
    evidence:
      - evidence.typescript.reviewability_fixture_tests
  claim.docs.typescript_maturation_advisory_thresholds:
    object: docs.typescript_maturation.overview
    text: TypeScript maturation notes document active advisory-only threshold
      config for assess reviewability findings.
    severity: medium
    evidence:
      - evidence.typescript.reviewability_fixture_tests
      - evidence.typescript.advisory_threshold_config_tests
  claim.docs.typescript_maturation_real_repo_evidence:
    object: docs.typescript_maturation.overview
    text: TypeScript maturation notes describe temporary and external real Git repository reviewability
      evidence for low-noise source-plus-test and source-heavy source-only
      advisory scenarios.
    severity: high
    evidence:
      - evidence.typescript.real_repo_reviewability_tests
      - evidence.typescript.external_reviewability_comparison
  claim.docs.agent_hooks_install_surface:
    object: docs.agent_client_hooks.overview
    text: Agent hook docs describe Codex and Claude Code hook installation, repo/user scope behavior, and configured-repo-only hook execution.
    severity: high
    evidence:
      - evidence.agent_hooks.generated_templates
      - evidence.agent_hooks.configured_repo_noop
  claim.docs.context_compression_safety:
    object: docs.context_compression.overview
    text: Context compression docs describe deterministic defaults, optional Headroom support, fallback behavior, and sanitized supporting-context boundary.
    severity: medium
    evidence:
      - evidence.context_compression.deterministic_backends
      - evidence.context_compression.headroom_boundary
      - evidence.context_compression.pack_fallback
  claim.docs.release_checklist_packaging:
    object: docs.release_checklist.overview
    text: Release checklist documents release-only packaging checks, built artifact validation, clean extra installs, and trusted publish workflow requirements.
    severity: high
    evidence:
      - evidence.release.packaging_tests
      - evidence.release.publish_workflow
  claim.docs.architecture_policy_tach:
    object: docs.architecture_policy.overview
    text: Architecture policy docs require strict Tach root-module coverage and architecture decision notes for Tach policy changes.
    severity: high
    evidence:
      - evidence.architecture.strict_tach_config
      - evidence.architecture.decision_notes
