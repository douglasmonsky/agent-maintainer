evidence:
  evidence.docsync.domain_contract:
    type: code
    description: Tach domain contract keeps DocSync independent of Agent Maintainer
      and Archguard.
    anchors:
    - path: src/docsync/tach.domain.toml
      mode: explicit_region
  evidence.docsync.boundary_test:
    type: test
    description: Boundary test forbids DocSync imports of project-internal packages.
    anchors:
    - path: tests/docsync/test_boundaries.py
      mode: explicit_region
  evidence.docsync.explicit_evidence_scanner:
    type: code
    description: DocSync scans explicit evidence regions by configured directives.
    anchors:
    - path: src/docsync/comments/scanner.py
      mode: explicit_region
  evidence.docsync.generated_outputs_commands:
    type: code
    description: DocSync commands write rebuildable generated outputs.
    anchors:
    - path: src/docsync/commands/core.py
      mode: explicit_region
  evidence.docsync.cli_commands:
    type: code
    description: DocSync CLI registers command surface.
    anchors:
    - path: src/docsync/cli.py
      mode: explicit_region
  evidence.docsync.onboarding_acceptance_test:
    type: test
    description: DocSync onboarding flow acceptance test.
    anchors:
    - path: tests/docsync/test_docsync_onboarding_flow.py
      mode: explicit_region
  evidence.readme.package_metadata:
    type: config
    description: Package metadata defines distribution identity, Python support, and
      console scripts.
    anchors:
    - path: pyproject.toml
      mode: explicit_region
  evidence.readme.command_registry:
    type: code
    description: Agent Maintainer CLI registry exposes documented top-level commands.
    anchors:
    - path: src/agent_maintainer/cli.py
      mode: explicit_region
