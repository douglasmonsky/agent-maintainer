[features]
hooks = true

# Fast feedback immediately after Codex writes files. This is intentionally cheap:
# file length, change budget, suppression budget, and Ruff.
[[hooks.PostToolUse]]
matcher = "apply_patch|Edit|Write"

[[hooks.PostToolUse.hooks]]
type = "command"
command = 'python3 "$(git rev-parse --show-toplevel)/.codex/hooks/post_edit_fast_gate.py"'
timeout = 60
statusMessage = "Running fast Python guardrails"

# Final gate. If verification fails, Codex is continued with the failure report
# instead of finishing with broken work.
[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = 'python3 "$(git rev-parse --show-toplevel)/.codex/hooks/stop_full_verify.py"'
timeout = 600
statusMessage = "Running final verification"
