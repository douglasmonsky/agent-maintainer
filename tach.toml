# docsync:evidence.start evidence.architecture.strict_tach_config
source_roots = ["src", ".codex/hooks", ".claude/hooks"]
root_module = "forbid"
exact = true
exclude = [
  ".git/",
  ".mypy_cache/",
  ".pytest_cache/",
  ".ruff_cache/",
  ".venv/",
  "build/",
  "dist/",
  "htmlcov/",
  "tests/",
  "venv/",
]

# Package-level contracts live beside code in tach.domain.toml files.
# Do not add broad root path buckets just to make root_module pass.
# docsync:evidence.end evidence.architecture.strict_tach_config

[[modules]]
path = "agent_maintainer.__main__"
depends_on = ["agent_maintainer.cli"]

[[modules]]
path = "agent_maintainer.cli"
depends_on = [
  "agent_maintainer.context.cli",
  "agent_maintainer.core.bootstrap",
  "agent_maintainer.core.guidance",
  "agent_maintainer.core.scaffold.initializer",
  "agent_maintainer.core.runtime",
  "agent_maintainer.doctor.cli",
  "agent_maintainer.hooks.cli",
  "agent_maintainer.verify.quiet",
]

[[modules]]
path = "hook_audit"
depends_on = []

[[modules]]
path = "post_edit_fast_gate"
depends_on = []

[[modules]]
path = "post_tool_use"
depends_on = []

[[modules]]
path = "stop"
depends_on = []

[[modules]]
path = "stop_full_verify"
depends_on = []

[[modules]]
path = "subagent_stop"
depends_on = []

[[modules]]
path = "agent_maintainer"
depends_on = []

[[modules]]
path = "agent_maintainer.models"
depends_on = []

[[modules]]
path = "agent_maintainer.tach"
depends_on = ["archguard.tach_config"]
