source_roots = ["."]
root_module = "forbid"
exact = true
exclude = [
  ".codex/",
  ".git/",
  ".mypy_cache/",
  ".pytest_cache/",
  ".ruff_cache/",
  ".venv/",
  "build/",
  "dist/",
  "htmlcov/",
  "tests/",
  "venv/",
]

layers = ["entrypoint", "orchestration", "runtime", "shared", "models"]

[[modules]]
path = "scripts"
layer = "shared"

[[modules]]
path = "guardrail_lib"
layer = "shared"

[[modules]]
path = "scripts.guardrail"
layer = "entrypoint"

[[modules]]
paths = [
  "scripts.check_change_budget",
  "scripts.check_file_lengths",
  "scripts.check_pip_audit_config",
  "scripts.check_structure",
  "scripts.check_suppression_budget",
  "scripts.check_tach_config",
  "scripts.guardrail_doctor",
  "scripts.guardrail_doctor_setup",
  "scripts.guardrail_core.guidance",
  "scripts.run_mutmut",
  "scripts.run_bandit",
  "scripts.run_pyright",
  "scripts.run_ruff",
  "scripts.guardrail_tach",
  "scripts.verify_quiet",
]
layer = "orchestration"

[[modules]]
paths = [
  "scripts.guardrail_core.args",
  "scripts.guardrail_catalogs",
  "scripts.guardrail_catalogs.catalog",
  "scripts.guardrail_catalogs.docs",
  "scripts.guardrail_catalogs.python",
  "scripts.guardrail_catalogs.security",
  "scripts.guardrail_doctor_support.hook_audit",
  "scripts.guardrail_doctor_support.policy",
  "scripts.guardrail_doctor_support.logs",
  "scripts.guardrail_core.executor",
  "scripts.guardrail_core.layout",
  "scripts.guardrail_core.runtime",
  "scripts.guardrail_core.tool_capabilities",
  "scripts.run_secret_scan",
  "guardrail_lib.checks.change_budget",
  "guardrail_lib.checks.file_lengths",
  "guardrail_lib.checks.structure",
  "guardrail_lib.checks.suppression_budget",
]
layer = "runtime"

[[modules]]
paths = [
  "scripts.guardrail_core.config",
  "scripts.guardrail_core.reporting",
  "guardrail_lib.config.coercion",
  "guardrail_lib.config.loader",
  "guardrail_lib.config.modes",
  "guardrail_lib.verify.artifacts",
]
layer = "shared"

[[modules]]
paths = [
  "scripts.guardrail_doctor_support.models",
  "scripts.guardrail_models",
  "guardrail_lib.config.schema",
]
layer = "models"
