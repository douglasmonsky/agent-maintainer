source_roots = ["src", ".codex/hooks"]
root_module = "forbid"
exact = true
exclude = [
  ".git/",
  ".mypy_cache/",
  ".pytest_cache/",
  ".ruff_cache/",
  ".venv/",
  "build/",
  "dist/",
  "htmlcov/",
  "tests/",
  "venv/",
]

layers = ["entrypoint", "orchestration", "runtime", "shared", "models"]

[[modules]]
paths = [
  "agent_maintainer.cli",
  "agent_maintainer.__main__",
  "agent_maintainer.hooks.cli",
  "hook_audit",
  "post_edit_fast_gate",
  "stop_full_verify",
]
layer = "entrypoint"

[[modules]]
paths = [
  "agent_maintainer.catalogs",
  "agent_maintainer.catalogs.catalog",
  "agent_maintainer.catalogs.docs",
  "agent_maintainer.catalogs.python",
  "agent_maintainer.catalogs.security",
  "agent_maintainer.checks.pip_audit_config",
  "agent_maintainer.checks.tach_config",
  "agent_maintainer.doctor",
  "agent_maintainer.doctor.cli",
  "agent_maintainer.doctor.setup",
  "agent_maintainer.doctor.support.logs",
  "agent_maintainer.core.bootstrap",
  "agent_maintainer.core.init_templates",
  "agent_maintainer.core.initializer",
  "agent_maintainer.hooks.manager",
  "agent_maintainer.hooks.merge",
  "agent_maintainer.hooks.templates",
  "agent_maintainer.runners",
  "agent_maintainer.runners.bandit",
  "agent_maintainer.runners.mutmut",
  "agent_maintainer.runners.pyright",
  "agent_maintainer.runners.ruff",
  "agent_maintainer.runners.secret_scan",
  "agent_maintainer.verify",
  "agent_maintainer.verify.quiet",
]
layer = "orchestration"

[[modules]]
paths = [
  "archguard",
  "archguard.__main__",
  "archguard.cli",
  "archguard.decision_notes",
  "archguard.git_diff",
  "archguard.models",
  "archguard.tach_config",
  "agent_maintainer.hooks",
  "agent_maintainer.hooks.audit",
  "agent_maintainer.hooks.runtime",
]
layer = "runtime"

[[modules]]
paths = [
  "agent_maintainer.checks",
  "agent_maintainer.checks.change_budget",
  "agent_maintainer.checks.file_lengths",
  "agent_maintainer.checks.structure",
  "agent_maintainer.checks.suppression_budget",
  "agent_maintainer.core",
  "agent_maintainer.core.args",
  "agent_maintainer.core.config",
  "agent_maintainer.core.executor",
  "agent_maintainer.core.guidance",
  "agent_maintainer.core.init_template_config",
  "agent_maintainer.core.layout",
  "agent_maintainer.core.reporting",
  "agent_maintainer.core.runtime",
  "agent_maintainer.core.tool_capability_registry",
  "agent_maintainer.core.tool_capability_types",
  "agent_maintainer.core.tool_capabilities",
  "agent_maintainer.doctor.support",
  "agent_maintainer.doctor.support.hook_audit",
  "agent_maintainer.doctor.support.policy",
  "agent_maintainer.tach",
]
layer = "runtime"

[[modules]]
paths = [
  "agent_maintainer",
  "agent_maintainer.config",
  "agent_maintainer.config.coercion",
  "agent_maintainer.config.loader",
  "agent_maintainer.config.modes",
  "agent_maintainer.config.schema",
  "agent_maintainer.verify.artifacts",
]
layer = "shared"

[[modules]]
paths = ["agent_maintainer.models", "agent_maintainer.doctor.support.models"]
layer = "models"
