source_roots = ["src", ".codex/hooks"]
root_module = "forbid"
exact = true
exclude = [
  ".git/",
  ".mypy_cache/",
  ".pytest_cache/",
  ".ruff_cache/",
  ".venv/",
  "build/",
  "dist/",
  "htmlcov/",
  "tests/",
  "venv/",
]

layers = ["entrypoint", "orchestration", "runtime", "shared", "models"]

[[modules]]
paths = [
  "ai_guardrails.cli",
  "ai_guardrails.__main__",
  "hook_audit",
  "post_edit_fast_gate",
  "stop_full_verify",
]
layer = "entrypoint"

[[modules]]
paths = [
  "ai_guardrails.catalogs",
  "ai_guardrails.catalogs.catalog",
  "ai_guardrails.catalogs.docs",
  "ai_guardrails.catalogs.python",
  "ai_guardrails.catalogs.security",
  "ai_guardrails.checks.pip_audit_config",
  "ai_guardrails.checks.tach_config",
  "ai_guardrails.doctor",
  "ai_guardrails.doctor.cli",
  "ai_guardrails.doctor.setup",
  "ai_guardrails.doctor.support.logs",
  "ai_guardrails.runners",
  "ai_guardrails.runners.bandit",
  "ai_guardrails.runners.mutmut",
  "ai_guardrails.runners.pyright",
  "ai_guardrails.runners.ruff",
  "ai_guardrails.runners.secret_scan",
  "ai_guardrails.verify",
  "ai_guardrails.verify.quiet",
]
layer = "orchestration"

[[modules]]
paths = [
  "ai_guardrails.checks",
  "ai_guardrails.checks.change_budget",
  "ai_guardrails.checks.file_lengths",
  "ai_guardrails.checks.structure",
  "ai_guardrails.checks.suppression_budget",
  "ai_guardrails.core",
  "ai_guardrails.core.args",
  "ai_guardrails.core.bootstrap",
  "ai_guardrails.core.config",
  "ai_guardrails.core.executor",
  "ai_guardrails.core.guidance",
  "ai_guardrails.core.layout",
  "ai_guardrails.core.reporting",
  "ai_guardrails.core.runtime",
  "ai_guardrails.core.tool_capability_registry",
  "ai_guardrails.core.tool_capability_types",
  "ai_guardrails.core.tool_capabilities",
  "ai_guardrails.doctor.support",
  "ai_guardrails.doctor.support.hook_audit",
  "ai_guardrails.doctor.support.policy",
  "ai_guardrails.tach",
]
layer = "runtime"

[[modules]]
paths = [
  "ai_guardrails",
  "ai_guardrails.config",
  "ai_guardrails.config.coercion",
  "ai_guardrails.config.loader",
  "ai_guardrails.config.modes",
  "ai_guardrails.config.schema",
  "ai_guardrails.verify.artifacts",
]
layer = "shared"

[[modules]]
paths = ["ai_guardrails.models", "ai_guardrails.doctor.support.models"]
layer = "models"
