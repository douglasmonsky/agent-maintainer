source_roots = ["src", ".codex/hooks", ".claude/hooks"]
root_module = "forbid"
exact = true
exclude = [
  ".git/",
  ".mypy_cache/",
  ".pytest_cache/",
  ".ruff_cache/",
  ".venv/",
  "build/",
  "dist/",
  "htmlcov/",
  "tests/",
  "venv/",
]

layers = ["entrypoint", "orchestration", "runtime", "shared", "models"]

[[modules]]
paths = [
  "agent_maintainer.cli",
  "agent_maintainer.__main__",
  "agent_maintainer.hooks.cli",
  "hook_audit",
  "post_edit_fast_gate",
  "post_tool_use",
  "stop",
  "stop_full_verify",
  "subagent_stop",
]
layer = "entrypoint"

