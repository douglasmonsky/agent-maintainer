name: Install Agent Maintainer external tools
description: Restore, verify, and expose pinned gitleaks and OSV Scanner binaries.

inputs:
  use-cache:
    description: Restore and save checksum-pinned downloads between trusted runs.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Restore pinned tool downloads
      if: inputs.use-cache == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ runner.temp }}/agent-maintainer-tool-cache
        key: agent-maintainer-tools-${{ runner.os }}-gitleaks-8.30.1-osv-2.4.0

    - name: Verify and install pinned tools
      shell: bash
      run: |
        set -euo pipefail
        TOOL_CACHE="$RUNNER_TEMP/agent-maintainer-tool-cache"
        mkdir -p "$TOOL_CACHE"

        GITLEAKS_VERSION=8.30.1
        GITLEAKS_ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        GITLEAKS_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ASSET}"
        GITLEAKS_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        GITLEAKS_ARCHIVE="$TOOL_CACHE/$GITLEAKS_ASSET"
        if [ ! -f "$GITLEAKS_ARCHIVE" ]; then
          curl -fsSL "$GITLEAKS_URL" -o "$GITLEAKS_ARCHIVE"
        fi
        ACTUAL_SHA256="$(sha256sum "$GITLEAKS_ARCHIVE" | cut -d ' ' -f 1)"
        test "$ACTUAL_SHA256" = "$GITLEAKS_SHA256"
        mkdir -p "$RUNNER_TEMP/gitleaks"
        tar -xzf "$GITLEAKS_ARCHIVE" -C "$RUNNER_TEMP/gitleaks" gitleaks
        echo "$RUNNER_TEMP/gitleaks" >> "$GITHUB_PATH"

        OSV_SCANNER_VERSION=2.4.0
        OSV_SCANNER_ASSET="osv-scanner_linux_amd64"
        OSV_SCANNER_URL="https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/${OSV_SCANNER_ASSET}"
        OSV_SCANNER_SHA256="15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0"
        OSV_SCANNER_BINARY="$TOOL_CACHE/$OSV_SCANNER_ASSET"
        if [ ! -f "$OSV_SCANNER_BINARY" ]; then
          curl -fsSL "$OSV_SCANNER_URL" -o "$OSV_SCANNER_BINARY"
        fi
        ACTUAL_SHA256="$(sha256sum "$OSV_SCANNER_BINARY" | cut -d ' ' -f 1)"
        test "$ACTUAL_SHA256" = "$OSV_SCANNER_SHA256"
        mkdir -p "$RUNNER_TEMP/osv-scanner-bin"
        install -m 0755 "$OSV_SCANNER_BINARY" "$RUNNER_TEMP/osv-scanner-bin/osv-scanner"
        echo "$RUNNER_TEMP/osv-scanner-bin" >> "$GITHUB_PATH"
