name: publish

on:
  workflow_dispatch:
    inputs:
      target:
        description: Package index to publish to.
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-profile-evidence:
    name: verify release profile (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [full, ci, security, manual, release]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Set up Node
        if: matrix.profile != 'release'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install Agent Maintainer dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f config/dev-lock.txt ]; then
            python -m pip install -r config/dev-lock.txt
          else
            python -m pip install -r config/dev-dependencies.txt
          fi
          python -m pip install -e .

      - name: Install Node dependencies
        if: matrix.profile != 'release'
        run: npm ci

      - name: Install external Agent Maintainer tools
        if: matrix.profile != 'release'
        uses: ./.github/actions/install-agent-maintainer-tools
        with:
          use-cache: "false"

      - name: Prepare evidence directory
        run: |
          echo "PROFILE_DIR=$RUNNER_TEMP/release-evidence/profiles" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/release-evidence/profiles"

      - name: Verify full profile
        if: matrix.profile == 'full'
        run: |
          python -m agent_maintainer verify --profile full
          cp .verify-logs/manifest.json "$PROFILE_DIR/full.json"

      - name: Verify CI profile
        if: matrix.profile == 'ci'
        run: |
          python -m agent_maintainer verify --profile ci --base-ref HEAD --compare-branch HEAD
          cp .verify-logs/manifest.json "$PROFILE_DIR/ci.json"

      - name: Verify security profile
        if: matrix.profile == 'security'
        run: |
          python -m agent_maintainer verify --profile security
          cp .verify-logs/manifest.json "$PROFILE_DIR/security.json"

      - name: Verify manual profile
        if: matrix.profile == 'manual'
        run: |
          python -m agent_maintainer verify --profile manual
          cp .verify-logs/manifest.json "$PROFILE_DIR/manual.json"

      - name: Verify release profile
        if: matrix.profile == 'release'
        run: |
          python -m agent_maintainer.release_evidence record \
            --output "$PROFILE_DIR/release.json" \
            -- just release-check

      - name: Upload release profile evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-profile-${{ github.sha }}-${{ matrix.profile }}
          path: ${{ runner.temp }}/release-evidence/profiles/${{ matrix.profile }}.json
          if-no-files-found: error
          retention-days: 7

  release-evidence:
    name: aggregate exact-commit release evidence
    needs: release-profile-evidence
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Prepare evidence directory
        run: |
          echo "EVIDENCE_DIR=$RUNNER_TEMP/release-evidence" >> "$GITHUB_ENV"
          echo "PROFILE_DIR=$RUNNER_TEMP/release-evidence/profiles" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/release-evidence/profiles"

      - name: Download release profile evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-profile-${{ github.sha }}-*
          path: ${{ runner.temp }}/release-evidence/profiles
          merge-multiple: true

      - name: Aggregate exact-commit release evidence
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          python -m agent_maintainer.release_evidence aggregate \
            --expected-sha "$EXPECTED_SHA" \
            --manifest "$PROFILE_DIR/full.json" \
            --manifest "$PROFILE_DIR/ci.json" \
            --manifest "$PROFILE_DIR/security.json" \
            --manifest "$PROFILE_DIR/manual.json" \
            --manifest "$PROFILE_DIR/release.json" \
            --output "$EVIDENCE_DIR/release-evidence.json"

      - name: Upload exact-commit release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-evidence-${{ github.sha }}
          path: ${{ runner.temp }}/release-evidence/release-evidence.json
          if-no-files-found: error
          retention-days: 7

  build:
    name: build distributions
    runs-on: ubuntu-latest
    outputs:
      distribution_manifest_sha256: ${{ steps.distribution_bundle.outputs.manifest_sha256 }}
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f config/dev-lock.txt ]; then
            python -m pip install -r config/dev-lock.txt
          else
            python -m pip install -r config/dev-dependencies.txt
          fi

      - name: Build distributions
        run: |
          rm -rf dist build ./*.egg-info ./src/*.egg-info
          python -m build
          python -m twine check dist/*

      - name: Create and verify distribution bundle
        id: distribution_bundle
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          python -m agent_maintainer.release_artifacts create \
            --source dist \
            --bundle "$RUNNER_TEMP/python-distributions" \
            --expected-sha "$EXPECTED_SHA"
          MANIFEST_SHA256="$(sha256sum \
            "$RUNNER_TEMP/python-distributions/manifest.json" | cut -d ' ' -f 1)"
          python -m agent_maintainer.release_artifacts verify \
            --bundle "$RUNNER_TEMP/python-distributions" \
            --expected-sha "$EXPECTED_SHA" \
            --expected-manifest-sha256 "$MANIFEST_SHA256"
          printf 'manifest_sha256=%s\n' "$MANIFEST_SHA256" >> "$GITHUB_OUTPUT"

      - name: Upload verified distribution bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-distributions
          path: ${{ runner.temp }}/python-distributions/
          if-no-files-found: error

  # docsync:evidence.start evidence.release.publish_workflow
  attach-github-release-artifacts:
    name: attach GitHub release artifacts
    needs: [release-evidence, build]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    permissions:
      contents: write # Attach wheel and sdist files to the GitHub release.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Download exact-commit release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-evidence-${{ github.sha }}
          path: ${{ runner.temp }}/release-evidence

      - name: Validate exact-commit release evidence
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          python -m agent_maintainer.release_evidence validate \
            --expected-sha "$EXPECTED_SHA" \
            --manifest "$RUNNER_TEMP/release-evidence/release-evidence.json"

      - name: Download verified distribution bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-distributions
          path: ${{ runner.temp }}/python-distributions

      - name: Verify distribution bundle
        env:
          EXPECTED_MANIFEST_SHA256: ${{ needs.build.outputs.distribution_manifest_sha256 }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          python -m agent_maintainer.release_artifacts verify \
            --bundle "$RUNNER_TEMP/python-distributions" \
            --expected-sha "$EXPECTED_SHA" \
            --expected-manifest-sha256 "$EXPECTED_MANIFEST_SHA256"

      - name: Attach distributions to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$RUNNER_TEMP/python-distributions/packages/"* \
            --clobber \
            --repo "$GITHUB_REPOSITORY"

  publish-testpypi:
    name: publish to TestPyPI
    needs: [release-evidence, build]
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    environment:
      name: testpypi
      url: https://test.pypi.org/project/agent-maintainer/
    permissions:
      contents: read
      id-token: write # Mint the TestPyPI Trusted Publishing token.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Download exact-commit release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-evidence-${{ github.sha }}
          path: ${{ runner.temp }}/release-evidence

      - name: Validate exact-commit release evidence
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          python -m agent_maintainer.release_evidence validate \
            --expected-sha "$EXPECTED_SHA" \
            --manifest "$RUNNER_TEMP/release-evidence/release-evidence.json"

      - name: Download verified distribution bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-distributions
          path: ${{ runner.temp }}/python-distributions

      - name: Verify distribution bundle
        env:
          EXPECTED_MANIFEST_SHA256: ${{ needs.build.outputs.distribution_manifest_sha256 }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          python -m agent_maintainer.release_artifacts verify \
            --bundle "$RUNNER_TEMP/python-distributions" \
            --expected-sha "$EXPECTED_SHA" \
            --expected-manifest-sha256 "$EXPECTED_MANIFEST_SHA256"

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: ${{ runner.temp }}/python-distributions/packages/

  publish-pypi:
    name: publish to PyPI
    needs: [release-evidence, build]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    environment:
      name: pypi
      url: https://pypi.org/project/agent-maintainer/
    permissions:
      contents: read
      id-token: write # Mint the PyPI Trusted Publishing token.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Download exact-commit release evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-evidence-${{ github.sha }}
          path: ${{ runner.temp }}/release-evidence

      - name: Validate exact-commit release evidence
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          python -m agent_maintainer.release_evidence validate \
            --expected-sha "$EXPECTED_SHA" \
            --manifest "$RUNNER_TEMP/release-evidence/release-evidence.json"

      - name: Download verified distribution bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-distributions
          path: ${{ runner.temp }}/python-distributions

      - name: Verify distribution bundle
        env:
          EXPECTED_MANIFEST_SHA256: ${{ needs.build.outputs.distribution_manifest_sha256 }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          python -m agent_maintainer.release_artifacts verify \
            --bundle "$RUNNER_TEMP/python-distributions" \
            --expected-sha "$EXPECTED_SHA" \
            --expected-manifest-sha256 "$EXPECTED_MANIFEST_SHA256"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: ${{ runner.temp }}/python-distributions/packages/
  # docsync:evidence.end evidence.release.publish_workflow
