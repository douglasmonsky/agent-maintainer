name: deep-verify

on:
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * 1"

permissions:
  contents: read

concurrency:
  group: deep-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deep-verify:
    name: scheduled deep verification
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install Agent Maintainer dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f config/dev-lock.txt ]; then
            python -m pip install -r config/dev-lock.txt
          else
            python -m pip install -r config/dev-dependencies.txt
          fi

      - name: Install external Agent Maintainer tools
        run: |
          npm ci
          GITLEAKS_VERSION=8.30.1
          GITLEAKS_ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          GITLEAKS_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ASSET}"
          GITLEAKS_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          curl -sSL "$GITLEAKS_URL" -o "$RUNNER_TEMP/gitleaks.tar.gz"
          ACTUAL_SHA256="$(sha256sum "$RUNNER_TEMP/gitleaks.tar.gz" | cut -d ' ' -f 1)"
          test "$ACTUAL_SHA256" = "$GITLEAKS_SHA256"
          mkdir -p "$RUNNER_TEMP/gitleaks"
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP/gitleaks" gitleaks
          echo "$RUNNER_TEMP/gitleaks" >> "$GITHUB_PATH"

          OSV_SCANNER_VERSION=2.4.0
          OSV_SCANNER_ASSET="osv-scanner_linux_amd64"
          OSV_SCANNER_URL="https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/${OSV_SCANNER_ASSET}"
          OSV_SCANNER_SHA256="15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0"
          curl -sSL "$OSV_SCANNER_URL" -o "$RUNNER_TEMP/osv-scanner"
          ACTUAL_SHA256="$(sha256sum "$RUNNER_TEMP/osv-scanner" | cut -d ' ' -f 1)"
          test "$ACTUAL_SHA256" = "$OSV_SCANNER_SHA256"
          chmod +x "$RUNNER_TEMP/osv-scanner"
          mkdir -p "$RUNNER_TEMP/osv-scanner-bin"
          mv "$RUNNER_TEMP/osv-scanner" "$RUNNER_TEMP/osv-scanner-bin/osv-scanner"
          echo "$RUNNER_TEMP/osv-scanner-bin" >> "$GITHUB_PATH"

      - name: Install project package
        run: python -m pip install -e .

      - name: Verify security profile
        run: python3 -m agent_maintainer verify --profile security

      - name: Verify manual profile
        run: python3 -m agent_maintainer verify --profile manual

      - name: Append verification summary
        if: always()
        run: |
          if [ -f .verify-logs/pr-summary.md ]; then
            cat .verify-logs/pr-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload safe verification logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deep-verify-logs
          path: |
            .verify-logs/manifest.json
            .verify-logs/LAST_FAILURE.md
            .verify-logs/pr-summary.md
            .verify-logs/*.log
            .verify-logs/*.json
            !.verify-logs/context/**
          if-no-files-found: ignore
