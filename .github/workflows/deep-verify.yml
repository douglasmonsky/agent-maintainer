name: deep-verify

on:
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * 1"

permissions:
  contents: read

jobs:
  deep-verify:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install Agent Maintainer dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f config/dev-lock.txt ]; then
            python -m pip install -r config/dev-lock.txt
          else
            python -m pip install -r config/dev-dependencies.txt
          fi

      - name: Install external Agent Maintainer tools
        run: |
          npm ci
          GITLEAKS_VERSION=8.30.1
          GITLEAKS_ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          GITLEAKS_SHA256="f2c125ea1026a5af95fff8cc7e9bbe5acee4c3d6560fa26ef1830381be11e585"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ASSET}" \
            -o "$RUNNER_TEMP/${GITLEAKS_ASSET}"
          ACTUAL_SHA256="$(sha256sum "$RUNNER_TEMP/${GITLEAKS_ASSET}" | awk '{print $1}')"
          test "$ACTUAL_SHA256" = "$GITLEAKS_SHA256"
          mkdir -p "$RUNNER_TEMP/gitleaks"
          tar -xzf "$RUNNER_TEMP/${GITLEAKS_ASSET}" -C "$RUNNER_TEMP/gitleaks" gitleaks
          echo "$RUNNER_TEMP/gitleaks" >> "$GITHUB_PATH"
          OSV_SCANNER_VERSION=2.2.3
          OSV_SCANNER_ASSET="osv-scanner_linux_amd64"
          OSV_SCANNER_SHA256="b72528f57dc981d975ebf7ff7c4f0bea6047d8253e376035e2353cccafc4d48d"
          curl -fsSL \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/${OSV_SCANNER_ASSET}" \
            -o "$RUNNER_TEMP/osv-scanner"
          ACTUAL_SHA256="$(sha256sum "$RUNNER_TEMP/osv-scanner" | awk '{print $1}')"
          test "$ACTUAL_SHA256" = "$OSV_SCANNER_SHA256"
          chmod +x "$RUNNER_TEMP/osv-scanner"
          mkdir -p "$RUNNER_TEMP/osv-scanner-bin"
          mv "$RUNNER_TEMP/osv-scanner" "$RUNNER_TEMP/osv-scanner-bin/osv-scanner"
          echo "$RUNNER_TEMP/osv-scanner-bin" >> "$GITHUB_PATH"

      - name: Install project package
        run: python -m pip install -e .

      - name: Verify security profile
        run: python3 -m agent_maintainer verify --profile security

      - name: Verify manual profile
        run: python3 -m agent_maintainer verify --profile manual

      - name: Append verification summary
        if: always()
        run: |
          if [ -f .verify-logs/pr-summary.md ]; then
            cat .verify-logs/pr-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload safe verification logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: deep-verify-logs
          path: |
            .verify-logs/manifest.json
            .verify-logs/LAST_FAILURE.md
            .verify-logs/pr-summary.md
            .verify-logs/*.log
            .verify-logs/*.json
            !.verify-logs/context/**
          if-no-files-found: ignore
