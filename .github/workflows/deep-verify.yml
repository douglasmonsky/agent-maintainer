name: deep-verify

on:
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * 1"

permissions:
  contents: read

concurrency:
  group: deep-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deep-verify:
    name: scheduled deep verification
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            config/dev-lock.txt
            pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Agent Maintainer dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f config/dev-lock.txt ]; then
            python -m pip install -r config/dev-lock.txt
          else
            python -m pip install -r config/dev-dependencies.txt
          fi

      - name: Install Node dependencies
        run: npm ci

      - name: Install external Agent Maintainer tools
        uses: ./.github/actions/install-agent-maintainer-tools

      - name: Install project package
        run: python -m pip install -e .

      - name: Verify security profile
        run: python3 -m agent_maintainer verify --profile security

      - name: Verify manual profile
        run: python3 -m agent_maintainer verify --profile manual

      - name: Append verification summary
        if: always()
        run: |
          if [ -f .verify-logs/pr-summary.md ]; then
            cat .verify-logs/pr-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload safe verification logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deep-verify-logs
          path: |
            .verify-logs/manifest.json
            .verify-logs/LAST_FAILURE.md
            .verify-logs/pr-summary.md
            .verify-logs/*.log
            .verify-logs/*.json
            !.verify-logs/context/**
          include-hidden-files: true
          if-no-files-found: ignore
