name: verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install guardrail dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f config/dev-lock.txt ]; then
            python -m pip install -r config/dev-lock.txt
          else
            python -m pip install -r config/dev-dependencies.txt
          fi

      - name: Install external guardrail tools
        run: |
          npm ci
          GITLEAKS_VERSION=8.30.1
          GITLEAKS_ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          GITLEAKS_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ASSET}"
          curl -sSL "$GITLEAKS_URL" -o "$RUNNER_TEMP/gitleaks.tar.gz"
          mkdir -p "$RUNNER_TEMP/gitleaks"
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP/gitleaks" gitleaks
          echo "$RUNNER_TEMP/gitleaks" >> "$GITHUB_PATH"

      - name: Install project when package metadata exists
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys
          import tomllib

          has_metadata = Path("setup.py").exists() or Path("setup.cfg").exists()
          if Path("pyproject.toml").exists():
              with Path("pyproject.toml").open("rb") as handle:
                  data = tomllib.load(handle)
              has_metadata = has_metadata or "project" in data or "build-system" in data

          if has_metadata:
              subprocess.check_call([sys.executable, "-m", "pip", "install", "-e", "."])
          else:
              print("No installable package metadata found; skipping editable install.")
          PY

      - name: Verify quietly
        run: |
          BASE_REF="origin/${GITHUB_BASE_REF:-main}"
          python3 -m scripts.guardrail verify --profile ci --base-ref "$BASE_REF" --compare-branch "$BASE_REF"

      - name: Upload full verification logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verify-logs
          path: |
            .verify-logs/
            coverage.xml
          if-no-files-found: ignore
