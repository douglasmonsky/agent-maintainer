repos:
  - repo: local
    hooks:
      - id: agent-maintainer-precommit
        name: Agent Maintainer precommit
        entry: >-
          env PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=src python3 -m agent_maintainer verify
          --profile precommit --base-ref HEAD --staged
        language: system
        pass_filenames: false
