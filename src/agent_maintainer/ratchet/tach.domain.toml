# Tach domain contract for agent_maintainer.ratchet.
# Keep this file close to the code it governs.

[root]
depends_on = []

[[modules]]
path = "baseline"
depends_on = [
  "//agent_maintainer.core.config",
  "findings",
  "models",
]

[[modules]]
path = "cli"
depends_on = [
  "//agent_maintainer.core.config",
  "baseline",
  "findings",
  "models",
  "ranking",
  "reporting",
  "status",
]

[[modules]]
path = "findings"
depends_on = [
  "//agent_maintainer.checks.file_lengths",
  "//agent_maintainer.checks.structure",
  "//agent_maintainer.config.schema",
  "//agent_maintainer.core.config",
  "models",
]

[[modules]]
path = "guidance"
depends_on = [
  "//agent_maintainer.core.config",
]

[[modules]]
path = "models"
depends_on = []

[[modules]]
path = "ranking"
depends_on = [
  "models",
]

[[modules]]
path = "reporting"
depends_on = [
  "ranking",
]

[[modules]]
path = "status"
depends_on = [
  "findings",
  "models",
]
