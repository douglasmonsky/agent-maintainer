# Tach domain contract for agent_maintainer.wait.
# Wait adapters own maintainer-specific polling and CLI integration.

[root]
depends_on = []

[[modules]]
path = "cli"
depends_on = [
  "broker",
  "codex_rewake",
  "github",
  "github_pr",
  "registry",
  "sweeper",
  "verifier",
  "//agent_maintainer.runtime_events.waiting",
]

[[modules]]
path = "github"
depends_on = [
  "//agent_waits.models",
]

[[modules]]
path = "github_pr"
depends_on = [
  "//agent_waits.models",
]

[[modules]]
path = "broker"
depends_on = [
  "registry",
  "sweeper",
  "//agent_waits.broker",
]

[[modules]]
path = "codex_rewake"
depends_on = [
  "registry",
  "//agent_waits.models",
]

[[modules]]
path = "models"
depends_on = [
  "//agent_waits.models",
]

[[modules]]
path = "registry"
depends_on = [
  "github_pr",
  "//agent_waits.registry",
]

[[modules]]
path = "sweeper"
depends_on = [
  "github_pr",
  "registry",
  "//agent_waits.models",
]

[[modules]]
path = "verifier"
depends_on = [
  "verifier_manifest",
  "//agent_waits.models",
]

[[modules]]
path = "verifier_manifest"
depends_on = []
