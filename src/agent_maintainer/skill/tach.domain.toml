# Tach domain contract for the portable personal setup skill.
[root]
depends_on = []

[[modules]]
path = "cli"
depends_on = ["lifecycle"]

[[modules]]
path = "lifecycle"
depends_on = ["models", "ownership", "resources", "transactions"]

[[modules]]
path = "models"
depends_on = []

[[modules]]
path = "ownership"
depends_on = ["models"]

[[modules]]
path = "resources"
depends_on = ["models"]

[[modules]]
path = "transactions"
depends_on = []
