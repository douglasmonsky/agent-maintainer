# Tach domain contract for agent_maintainer.hooks.
# Keep this file close to the code it governs.

[root]
depends_on = []

[[modules]]
path = "adapters"
depends_on = [
  "templates",
]

[[modules]]
path = "audit"
depends_on = [
  "//agent_maintainer.core.runtime",
]

[[modules]]
path = "cli"
depends_on = [
  "manager",
  "runtime",
]

[[modules]]
path = "context"
depends_on = [
  "//agent_maintainer.config.loader",
  "//agent_context.budget",
  "//agent_maintainer.context.pack.builder",
  "//agent_maintainer.context.pack.rendering",
]

[[modules]]
path = "manager"
depends_on = [
  "adapters",
  "merge",
]

[[modules]]
path = "merge"
depends_on = [
  "templates",
]

[[modules]]
path = "runtime"
depends_on = [
  "audit",
  "context",
  "subprocess_runner",
]

[[modules]]
path = "subprocess_runner"
depends_on = [
  "audit",
]

[[modules]]
path = "templates"
depends_on = [
  "runtime",
]
