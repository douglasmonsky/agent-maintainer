# Tach domain contract for agent_maintainer.hooks.
# Keep this file close to the code it governs.

[root]
depends_on = []

[[modules]]
path = "adapters"
depends_on = [
  "//agent_client_hooks.adapters",
  "//agent_client_hooks.constants",
]

[[modules]]
path = "audit"
depends_on = [
  "//agent_maintainer.core.runtime",
]

[[modules]]
path = "cli"
depends_on = [
  "manager",
  "runtime",
]

[[modules]]
path = "context"
depends_on = [
  "//agent_maintainer.config.loader",
  "//agent_context.budget",
  "//agent_context.pack_rendering",
  "//agent_maintainer.context.pack.builder",
]

[[modules]]
path = "manager"
depends_on = [
  "//agent_client_hooks.adapters",
  "//agent_client_hooks.merge",
]

[[modules]]
path = "merge"
depends_on = [
  "//agent_client_hooks.merge",
]

[[modules]]
path = "runtime"
depends_on = [
  "//agent_client_hooks.constants",
  "audit",
  "context",
  "runtime_eventing",
  "subprocess_runner",
]

[[modules]]
path = "runtime_eventing"
depends_on = [
  "//agent_maintainer.config.loader",
  "//agent_maintainer.config.schema",
  "//agent_maintainer.runtime_events.models",
  "//agent_maintainer.runtime_events.sinks",
]

[[modules]]
path = "subprocess_runner"
depends_on = [
  "audit",
]

[[modules]]
path = "templates"
depends_on = [
  "//agent_client_hooks.constants",
  "//agent_client_hooks.templates",
]
