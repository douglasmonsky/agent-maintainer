# Tach domain contract for agent_maintainer.hooks.
# Keep file close to the code it governs.
[root]
depends_on = []

[[modules]]
path = "adapters"
depends_on = [
  "//agent_client_hooks.adapters",
  "//agent_client_hooks.constants",
]

[[modules]]
path = "audit"
depends_on = [
  "//agent_maintainer.core.runtime",
]

[[modules]]
path = "cli"
depends_on = [
  "lifecycle",
  "manager",
  "pr_wait",
  "runtime",
]

[[modules]]
path = "context"
depends_on = [
  "//agent_maintainer.config.loader",
  "//agent_context.budget",
  "//agent_context.pack_rendering",
  "//agent_maintainer.context.pack.builder",
]

[[modules]]
path = "discovery"
depends_on = []

[[modules]]
path = "lifecycle"
depends_on = [
  "//agent_client_hooks.adapters",
  "//agent_client_hooks.manifest",
  "//agent_client_hooks.removal",
  "manager",
  "mutations",
]

[[modules]]
path = "manager"
depends_on = [
  "//agent_client_hooks.adapters",
  "//agent_client_hooks.merge",
  "mutations",
]

[[modules]]
path = "mutations"
depends_on = ["//agent_client_hooks.adapters"]

[[modules]]
path = "merge"
depends_on = [
  "//agent_client_hooks.merge",
]

[[modules]]
path = "pr_wait"
depends_on = [
  "//agent_client_hooks.constants",
  "//agent_maintainer.core.structured_values",
  "//agent_maintainer.wait.broker",
  "//agent_maintainer.wait.github_pr",
]

[[modules]]
path = "pre_push"
depends_on = [
  "//agent_maintainer.verify.fingerprint_inputs",
  "//agent_maintainer.verify.quiet",
]

[[modules]]
path = "readiness"
depends_on = [
  "//agent_maintainer.core.structured_values",
  "//agent_maintainer.wait.broker",
  "//agent_maintainer.verify.locking",
  "//agent_waits.models",
]

[[modules]]
path = "runtime"
depends_on = [
  "//agent_client_hooks.constants",
  "audit",
  "context",
  "discovery",
  "readiness",
  "runtime_eventing",
  "runtime_payload",
  "subprocess_runner",
]

[[modules]]
path = "runtime_payload"
depends_on = ["//agent_maintainer.core.structured_values"]

[[modules]]
path = "runtime_eventing"
depends_on = [
  "//agent_maintainer.config.loader",
  "//agent_maintainer.config.schema",
  "//agent_maintainer.runtime_events.models",
  "//agent_maintainer.runtime_events.sinks",
]

[[modules]]
path = "subprocess_runner"
depends_on = [
  "audit",
]

[[modules]]
path = "templates"
depends_on = [
  "//agent_client_hooks.constants",
  "//agent_client_hooks.templates",
]
