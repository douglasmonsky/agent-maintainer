# Tach domain contract for agent_maintainer.context.
# This package now owns the product CLI and context-pack adapters; reusable
# primitives and readers live in agent_context.

[root]
depends_on = []

[[modules]]
path = "budget"
depends_on = ["//agent_context.budget"]

[[modules]]
path = "cli"
depends_on = [
  "recall",
  "pack.cli",
  "//agent_context.estimate",
  "//agent_context.failures",
  "//agent_context.reading.diff",
  "//agent_context.reading.diff_git",
  "//agent_context.reading.files",
  "//agent_context.reading.logs",
]

[[modules]]
path = "compression"
depends_on = []

[[modules]]
path = "compression.backends"
