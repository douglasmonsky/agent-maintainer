# Tach domain contract for agent_maintainer.assess.
# Keep this file close to code it governs.

[root]
depends_on = []

[[modules]]
path = "cli"
depends_on = [
"//agent_maintainer.config.loader",
"debt_score",
"evidence",
"reporting",
"reviewability",
"setup_advisor",
]

[[modules]]
path = "debt_score"
depends_on = [
  "//agent_maintainer.config.schema",
  "debt_categories",
  "debt_manifest",
  "models",
]


[[modules]]

path = "debt_categories"
depends_on = [
  "//agent_maintainer.config.schema",
  "debt_category_constants",
  "debt_manifest",
  "debt_security",
  "models",
]

[[modules]]
path = "debt_category_constants"
depends_on = []

[[modules]]
path = "debt_manifest"
depends_on = []

[[modules]]
path = "debt_security"
depends_on = ["//agent_maintainer.config.schema", "models"]

[[modules]]
path = "evidence"
depends_on = ["models"]

[[modules]]
path = "models"
depends_on = []

[[modules]]
path = "reporting"
depends_on = ["debt_score", "models"]

[[modules]]
path = "reviewability"
depends_on = [
"//agent_maintainer.checks.suppression_budget",
"//agent_maintainer.config.schema",
"//agent_maintainer.ecosystems.file_changes",
"//agent_maintainer.ecosystems.git_changes",
"//agent_maintainer.ecosystems.models",
"//agent_maintainer.ecosystems.registry",
"models",
]

[[modules]]
path = "setup_advisor"
depends_on = ["models"]
