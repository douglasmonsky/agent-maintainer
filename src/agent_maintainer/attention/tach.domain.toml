# Tach domain contract for agent_maintainer.attention.
# Attention scoring must stay deterministic, local, and artifact-backed.

[root]

depends_on = []


[[modules]]

path = "builder"
depends_on = [
  "models",
  "signal_context",
  "signals",
  "//agent_context.reading.file_safety",
]


[[modules]]

path = "cli"
depends_on = ["builder", "rendering"]


[[modules]]

path = "git_output"
depends_on = []


[[modules]]

path = "models"
depends_on = []


[[modules]]

path = "rendering"
depends_on = [
  "models",
  "//agent_maintainer.core.structured_values",
]


[[modules]]

path = "signal_artifacts"
depends_on = [
  "signal_context",
  "//agent_context.reading.file_safety",
  "//agent_maintainer.runtime_events.read",
]


[[modules]]

path = "signal_context"
depends_on = []


[[modules]]

path = "signals"
depends_on = [
  "git_output",
  "signal_artifacts",
  "signal_context",
  "//agent_maintainer.core.structured_values",
  "//agent_maintainer.runtime_events.read",
]
