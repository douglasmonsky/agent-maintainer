# Tach domain contract for agent_maintainer.runtime_events.
# Runtime events must remain local, compact, and independent of verifier output.

[root]

depends_on = []


[[modules]]

path = "cli"
depends_on = ["export", "read", "summary", "waste", "//agent_maintainer.config.schema"]

[[modules]]
path = "export"
depends_on = ["read"]


[[modules]]

path = "commands"
depends_on = ["models", "sinks", "//agent_maintainer.config.loader"]

[[modules]]

path = "waiting"
depends_on = ["models", "sinks", "//agent_maintainer.config.loader"]


[[modules]]

path = "models"
depends_on = ["redaction"]


[[modules]]

path = "redaction"
depends_on = []


[[modules]]

path = "read"
depends_on = []


[[modules]]

path = "sinks"
depends_on = ["models", "//agent_maintainer.config.schema"]


[[modules]]

path = "summary"
depends_on = ["read"]


[[modules]]

path = "waste"
depends_on = ["read"]
